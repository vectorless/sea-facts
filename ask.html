  <nav class="nav">

  <main class="container">
    <h1>🤖 Ask the Ocean</h1>
    <p class="muted">
      Ask me anything about the ocean! I search through everything I know and reply with
      the best fact I can find. (I'm a simple offline helper, not a know-it-all — but I
      try!)
    </p>

    <div class="chat" id="chat"><!-- messages injected here --></div>

    <div class="chips" id="chips"><!-- suggestion chips injected here --></div>

    <form class="chat-form" id="chat-form" autocomplete="off">
      <input type="text" id="chat-input" class="chat-input"
             placeholder="e.g. How deep is the ocean?" aria-label="Ask a question" />
      <button type="submit" class="btn btn--primary">Ask</button>
    </form>
  </main>

  <footer class="footer">
    Made with 💙 for ocean lovers. Keep our seas blue.
  </footer>
